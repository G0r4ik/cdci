name: Greetings

on: [pull_request_target, issues]

jobs:
  greeting:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
    - uses: actions/first-interaction@v1
      with:
        repo-token: ${{ secrets.GITHUB_TOKEN }}
        issue-message: |
          Спасибо за первый PR в этом репозитории! Перед тем как мы посмотрим на изменения,
          глянь, пожалуйста, [гайд по контрибьюшену](https://github.com/owner/repo/blob/main/CONTRIBUTING.md) —
          там есть пара требований к формату коммитов.
        pr-message: "Это ваш первый ПР там, ознакомтесь как оформлять"
