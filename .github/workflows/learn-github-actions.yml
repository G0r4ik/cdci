name: First CICD
run-name: ${{ github.actor }} is learning GitHub Actions


on: [push]

jobs:
  firstJob:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - run: npm install -g bats
      # - run 'echo "Првиет!"'
      - run: bats -v
  
